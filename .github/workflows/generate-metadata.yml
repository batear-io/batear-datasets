name: Generate Metadata

on:
  push:
    branches: [main]
    paths:
      - "field-tests/**"
      - "synthetic/**"

jobs:
  update-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate samples.json
        run: python tools/generate_metadata.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet metadata/samples.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metadata/samples.json
          git commit -m "ci: auto-update samples.json metadata"
          git push
